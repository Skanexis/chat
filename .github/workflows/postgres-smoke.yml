name: Postgres Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  postgres-smoke:
    name: Postgres smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phantom_lab_chat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d phantom_lab_chat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/phantom_lab_chat?schema=public
      STORAGE_DRIVER: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @phantom-lab/api prisma:generate

      - name: Apply Prisma migrations
        run: pnpm --filter @phantom-lab/api prisma:migrate:deploy

      - name: Run postgres smoke
        run: pnpm smoke:postgres
